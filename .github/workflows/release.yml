name: Release

on:
  push:
    branches: [main]

jobs:
  changesets:
    name: Changesets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Tag
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: release"
          commit: "chore: release"
          version: pnpm version-packages
          publish: pnpm changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }})
    needs: changesets
    if: needs.changesets.outputs.published == 'true'
    concurrency:
      group: release-build-${{ matrix.platform }}
      cancel-in-progress: false
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: List build output
        shell: bash
        run: |
          echo "=== build/ directory ==="
          find build -maxdepth 4 | head -100
          echo ""
          echo "=== artifacts/ directory (Electrobun auto-generated) ==="
          if [ -d "artifacts" ]; then
            find artifacts -type f | sort
          else
            echo "No artifacts/ directory found"
          fi
          echo ""
          echo "=== version.json files ==="
          find . -name "version.json" -not -path "*/node_modules/*" 2>/dev/null || echo "No version.json found"

      - name: Collect Electrobun artifacts
        shell: bash
        run: |
          # Check if Electrobun generated an artifacts/ directory
          if [ -d "artifacts" ]; then
            echo "Found Electrobun auto-generated artifacts/"
            find artifacts -type f | sort
            cp artifacts/* "$GITHUB_WORKSPACE/" 2>/dev/null || true
            echo "ELECTROBUN_ARTIFACTS=true" >> "$GITHUB_ENV"
          else
            echo "No Electrobun artifacts/ directory found, will generate manually"
            echo "ELECTROBUN_ARTIFACTS=false" >> "$GITHUB_ENV"
          fi

      - name: Package artifacts (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          APP_BUNDLE=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::No .app bundle found in build/"
            find build -maxdepth 4
            exit 1
          fi
          echo "Found app bundle: $APP_BUNDLE"
          cd "$(dirname "$APP_BUNDLE")"
          tar -czf "$GITHUB_WORKSPACE/CrossRecorder-${{ needs.changesets.outputs.version }}-macos-arm64.tar.gz" "$(basename "$APP_BUNDLE")"

      - name: Package artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $buildDir = Get-ChildItem -Path build -Recurse -Directory | Where-Object { $_.Name -match "^Cross\s?Recorder" } | Select-Object -First 1
          if (-not $buildDir) {
            Write-Error "Build directory not found"
            Get-ChildItem -Path build -Recurse -Directory | Select-Object -First 20
            exit 1
          }
          Write-Output "Found build dir: $($buildDir.FullName)"
          Compress-Archive -Path $buildDir.FullName -DestinationPath "CrossRecorder-${{ needs.changesets.outputs.version }}-windows-x64.zip"

      - name: Build NSIS installer (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          # ビルド出力ディレクトリを特定
          $buildDir = Get-ChildItem -Path build -Recurse -Directory | Where-Object { $_.Name -match "^Cross\s?Recorder" } | Select-Object -First 1
          if (-not $buildDir) {
            Write-Error "Build directory not found for NSIS"
            exit 1
          }
          Write-Output "NSIS source dir: $($buildDir.FullName)"

          # NSIS をインストール（windows-latest runner にはプリインストールされている）
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y
            $env:PATH += ";C:\Program Files (x86)\NSIS"
          }

          # インストーラーを生成
          makensis /DVERSION=${{ needs.changesets.outputs.version }} /DSOURCE_DIR="$($buildDir.FullName)" scripts\installer.nsi

          # 生成されたインストーラーをワークスペースルートに移動
          Move-Item "scripts\CrossRecorder-${{ needs.changesets.outputs.version }}-windows-x64-setup.exe" "." -ErrorAction SilentlyContinue
          if (-not (Test-Path "CrossRecorder-${{ needs.changesets.outputs.version }}-windows-x64-setup.exe")) {
            # NSIS の OutFile がスクリプトのあるディレクトリ基準でない場合に備える
            $setupExe = Get-ChildItem -Path . -Recurse -Filter "CrossRecorder-*-setup.exe" | Select-Object -First 1
            if ($setupExe) {
              Move-Item $setupExe.FullName "." -ErrorAction SilentlyContinue
            } else {
              Write-Error "NSIS installer not found"
              exit 1
            }
          }
          Write-Output "NSIS installer created successfully"

      - name: Generate updater artifacts (macOS)
        if: matrix.platform == 'macos' && env.ELECTROBUN_ARTIFACTS != 'true'
        shell: bash
        run: |
          # Find the build output directory
          BUILD_DIR=$(find build -maxdepth 1 -type d -name "*-macos-*" | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "::error::Could not find macOS build dir for updater artifacts"
            find build -maxdepth 2 -type d
            exit 1
          fi
          echo "Build dir: $BUILD_DIR"

          # Search for version.json broadly
          VERSION_JSON=$(find "$BUILD_DIR" -name "version.json" | head -1)
          if [ -z "$VERSION_JSON" ]; then
            # Also search in the entire build/ directory
            VERSION_JSON=$(find build -name "version.json" | head -1)
          fi

          if [ -n "$VERSION_JSON" ] && [ -f "$VERSION_JSON" ]; then
            echo "Found version.json: $VERSION_JSON"
            cat "$VERSION_JSON"
            HASH=$(python3 -c "import sys,json; print(json.load(open('$VERSION_JSON'))['hash'])")
            CHANNEL=$(python3 -c "import sys,json; print(json.load(open('$VERSION_JSON')).get('channel','stable'))")
            echo "hash=$HASH channel=$CHANNEL"
          else
            echo "::warning::version.json not found, using fallback values"
            echo "Searched in: $BUILD_DIR and build/"
            find build -type f -name "*.json" || true
            # Use stable channel and empty hash as fallback
            HASH=""
            CHANNEL="stable"
          fi

          PREFIX="${CHANNEL}-macos-arm64"

          # Create update.json
          cat > "$GITHUB_WORKSPACE/${PREFIX}-update.json" <<EOF
          {
            "version": "${{ needs.changesets.outputs.version }}",
            "hash": "$HASH",
            "updateAvailable": false,
            "updateReady": false,
            "error": ""
          }
          EOF
          echo "Generated ${PREFIX}-update.json:"
          cat "$GITHUB_WORKSPACE/${PREFIX}-update.json"

          # Create tar.zst bundle for updater
          APP_BUNDLE=$(find "$BUILD_DIR" -name "*.app" -type d | head -1)
          if [ -n "$APP_BUNDLE" ]; then
            cd "$(dirname "$APP_BUNDLE")"
            tar -cf "$GITHUB_WORKSPACE/app-bundle.tar" "$(basename "$APP_BUNDLE")"
            cd "$GITHUB_WORKSPACE"
            if ! command -v zstd &> /dev/null; then
              brew install zstd 2>/dev/null || sudo apt-get install -y zstd 2>/dev/null || true
            fi
            zstd -19 --rm -o "${PREFIX}-Cross Recorder.app.tar.zst" app-bundle.tar
            echo "Generated ${PREFIX}-Cross Recorder.app.tar.zst"
          else
            echo "::warning::No .app bundle found for tar.zst generation"
          fi

      - name: Generate updater artifacts (Windows)
        if: matrix.platform == 'windows' && env.ELECTROBUN_ARTIFACTS != 'true'
        shell: bash
        run: |
          BUILD_DIR=$(find build -maxdepth 1 -type d -name "*-win-*" | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "::error::Could not find Windows build dir for updater artifacts"
            find build -maxdepth 2 -type d
            exit 1
          fi
          echo "Build dir: $BUILD_DIR"

          # Search for version.json broadly
          VERSION_JSON=$(find "$BUILD_DIR" -name "version.json" | head -1)
          if [ -z "$VERSION_JSON" ]; then
            VERSION_JSON=$(find build -name "version.json" | head -1)
          fi

          if [ -n "$VERSION_JSON" ] && [ -f "$VERSION_JSON" ]; then
            echo "Found version.json: $VERSION_JSON"
            cat "$VERSION_JSON"
            HASH=$(python3 -c "import sys,json; print(json.load(open('$VERSION_JSON'))['hash'])")
            CHANNEL=$(python3 -c "import sys,json; print(json.load(open('$VERSION_JSON')).get('channel','stable'))")
            echo "hash=$HASH channel=$CHANNEL"
          else
            echo "::warning::version.json not found, using fallback values"
            find build -type f -name "*.json" || true
            HASH=""
            CHANNEL="stable"
          fi

          PREFIX="${CHANNEL}-win-x64"

          # Create update.json
          cat > "${PREFIX}-update.json" <<EOF
          {
            "version": "${{ needs.changesets.outputs.version }}",
            "hash": "$HASH",
            "updateAvailable": false,
            "updateReady": false,
            "error": ""
          }
          EOF
          echo "Generated ${PREFIX}-update.json:"
          cat "${PREFIX}-update.json"

          # Create tar.zst bundle for updater
          APP_DIR=$(find "$BUILD_DIR" -maxdepth 1 -type d -name "Cross*Recorder*" | head -1)
          if [ -z "$APP_DIR" ]; then
            APP_DIR="$BUILD_DIR"
          fi
          cd "$(dirname "$APP_DIR")"
          tar --force-local -cf "$GITHUB_WORKSPACE/app-bundle.tar" "$(basename "$APP_DIR")"
          cd "$GITHUB_WORKSPACE"
          if ! command -v zstd &> /dev/null; then
            choco install zstandard -y 2>/dev/null || true
          fi
          zstd -19 --rm -o "${PREFIX}-CrossRecorder.tar.zst" app-bundle.tar
          echo "Generated ${PREFIX}-CrossRecorder.tar.zst"

      - name: List generated files
        shell: bash
        run: |
          echo "=== Generated updater files ==="
          ls -la *-update.json 2>/dev/null || echo "No update.json files"
          ls -la *.tar.zst 2>/dev/null || echo "No tar.zst files"
          ls -la CrossRecorder-* 2>/dev/null || echo "No CrossRecorder packages"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cross-recorder-${{ matrix.platform }}
          path: |
            CrossRecorder-*.tar.gz
            CrossRecorder-*.zip
            CrossRecorder-*-setup.exe
            *-update.json
            *.tar.zst
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [changesets, build]
    if: needs.changesets.outputs.published == 'true'
    concurrency:
      group: release-create
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.changesets.outputs.version }}
          name: Cross Recorder v${{ needs.changesets.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*-setup.exe
            artifacts/**/*-update.json
            artifacts/**/*.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
