name: Build Native Binary

on:
  push:
    branches: [main]
    paths:
      - "src/native/**"
      - "scripts/build-native.sh"
      - ".github/workflows/build-native-binary.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build macOS native binary
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build native binary
        run: bash scripts/build-native.sh

      - name: Verify binary
        run: |
          file build/native/capture-system-audio
          build/native/capture-system-audio --check 2>&1 || true

      - name: Upload to native-bin-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if present, then recreate
          gh release delete native-bin-latest --yes 2>/dev/null || true
          gh release create native-bin-latest \
            --title "Native Binaries (latest)" \
            --notes "Auto-built native binaries from src/native/. Updated on every push to main that changes native source." \
            --prerelease \
            build/native/capture-system-audio
